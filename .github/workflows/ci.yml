name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        julia-version: ['1.11', '1.12']

    env:
      PYTHON_JULIACALL_HANDLE_SIGNALS: "yes"

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'

    - uses: julia-actions/setup-julia@v2
      with:
        version: ${{ matrix.julia-version }}

    - name: Patch OpenSSL version check
      if: matrix.julia-version == '1.12'
      run: |
        SITEDIR=$(python -c 'import site; print(site.getsitepackages()[0])')
        cat > "$SITEDIR/sitecustomize.py" << 'PYEOF'
        import ssl
        import struct
        # juliapkg restricts Julia to <=1.11 when OpenSSL < 3.5
        if ssl.OPENSSL_VERSION_INFO[:2] < (3, 5):
            ssl.OPENSSL_VERSION_INFO = (3, 5, 0, 0, 0)
        PYEOF
        python -c 'import ssl; print("OpenSSL version for juliapkg:", ssl.OPENSSL_VERSION_INFO)'

    - name: Install dependencies
      run: |
        pip install .[test]
        pip install pytest-cov 

    - name: Run tests 
      run: |
        coverage run --source=quanestimation -m pytest -s --junitxml=test-results.xml 
        coverage xml

    - name: Upload report to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        slug: QuanEstimation/QuanEstimation
        files: coverage.xml
        verbose: true

    - name: Upload test results to Codecov
      if: ${{ !cancelled() }}
      uses: codecov/test-results-action@v1
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        slug: QuanEstimation/QuanEstimation
        files: ./test-results.xml
